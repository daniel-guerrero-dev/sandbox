<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice1</title>
    <link rel="stylesheet" href="css1.css">
    <style>
        .internal-style{
            background-color: green;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="external-style">
        This has been styled externally
    </div>
    <div class="internal-style">
        <p>Hi this is styled with internal css styles</p>
    </div>
    <div class="inline-style">
        <button class="inline"  style="background-color: orange; color: black; font-size: 18px;">Inline method</button>
    </div>
</body>
</html>
